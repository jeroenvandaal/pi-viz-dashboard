<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard Control</title>
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
           background: #0a0e14; color: #e6edf3; padding: 24px; }
    h1 { font-size: 16px; letter-spacing: .1em; text-transform: uppercase; color: #8b949e; }
    .card { background: #10151d; border: 1px solid #30363d; border-radius: 12px; padding: 18px; margin-top: 16px; }
    .rowc { display: flex; align-items: center; justify-content: space-between; margin: 14px 0; font-size: 16px; }
    button { background: #161b22; color: #e6edf3; border: 1px solid #30363d; border-radius: 9px;
             padding: 12px 16px; font-size: 16px; cursor: pointer; }
    button:active { border-color: #58a6ff; }
    .sw { width: 52px; height: 30px; border-radius: 16px; background: #30363d; position: relative; }
    .sw.on { background: #2ea043; }
    .sw .kn { position: absolute; top: 3px; left: 3px; width: 24px; height: 24px; border-radius: 50%; background: #fff; transition: left .2s; }
    .sw.on .kn { left: 25px; }
    .val { min-width: 54px; text-align: center; color: #58a6ff; font-weight: 700; font-variant-numeric: tabular-nums; }
    .nav { display: flex; gap: 12px; } .nav button { flex: 1; }
  </style>
</head>
<body>
  <h1>Dashboard Control</h1>
  <div class="card">
    <div class="nav"><button id="prev">&#9664; Prev board</button><button id="next">Next board &#9654;</button></div>
  </div>
  <div class="card">
    <div class="rowc"><span>Auto-cycle</span><div class="sw" id="sw"><div class="kn"></div></div></div>
    <div class="rowc"><span>Seconds / board</span>
      <div style="display:flex;gap:10px;align-items:center">
        <button id="down">&#8722;</button><span class="val" id="val">10s</span><button id="up">+</button></div></div>
  </div>
  <script>
    const TOKEN = "__TOKEN__";
    const PRESETS = [5,10,15,30,60,120];
    const fmt = (s)=> s<60? s+"s" : (s/60)+"m";
    const nearest = (s)=> PRESETS.reduce((a,b)=>Math.abs(b-s)<Math.abs(a-s)?b:a);
    let cycle=false, interval=10;
    const sw=document.getElementById("sw"), val=document.getElementById("val");
    function render(){ sw.classList.toggle("on",cycle); val.textContent=fmt(interval); }
    async function patch(f){
      await fetch("/api/display",{method:"POST",headers:{"Content-Type":"application/json","X-Dashboard-Token":TOKEN},body:JSON.stringify(f)});
    }
    async function load(){ const d=await (await fetch("/api/display")).json(); cycle=d.cycle; interval=nearest(d.interval_sec); render(); }
    sw.onclick=()=>{ cycle=!cycle; render(); patch({cycle}); };
    document.getElementById("up").onclick=()=>{ interval=PRESETS[Math.min(PRESETS.length-1,PRESETS.indexOf(interval)+1)]; render(); patch({interval_sec:interval}); };
    document.getElementById("down").onclick=()=>{ interval=PRESETS[Math.max(0,PRESETS.indexOf(interval)-1)]; render(); patch({interval_sec:interval}); };
    // Prev/Next: the wall owns board order; we just send a relative nudge the wall understands.
    document.getElementById("next").onclick=()=> patch({nudge:1});
    document.getElementById("prev").onclick=()=> patch({nudge:-1});
    load(); setInterval(load, 3000);
  </script>
</body>
</html>
